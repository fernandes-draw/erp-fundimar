<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e40af', // Exemplo de cor azul industrial
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    {% if user.is_authenticated %}
    <nav class="bg-primary text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl">ERP Industrial</h1>
            <a href="{% url 'logout' %}" class="bg-red-500 px-3 py-1 rounded text-sm">Sair</a>
        </div>
    </nav>
    {% endif %}

    <main class="flex-grow container mx-auto p-4">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
