{% extends 'base.html' %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md border-t-4 border-primary">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Acesso ao Sistema</h2>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-gray-700">Usuário</label>
                <input type="text" name="username" required 
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Senha</label>
                <input type="password" name="password" required 
                    class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-primary focus:border-primary">
            </div>

            <button type="submit" 
                class="w-full bg-primary hover:bg-blue-800 text-white font-bold py-2 px-4 rounded transition duration-200">
                Entrar
            </button>
        </form>
    </div>
</div>
{% endblock %}
