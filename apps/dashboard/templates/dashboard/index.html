{% extends 'base.html' %}

{% block content %}
<div class="bg-white p-6 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-4">Bem-vindo ao ERP Fundimar, {{ user.username }}!</h2>
    <p class="text-gray-600">Este é o seu painel de controle inicial.</p>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
        <div class="p-4 bg-blue-50 border-l-4 border-blue-500 rounded">
            <h3 class="font-bold">Vendas</h3>
            <p>R$ 0,00</p>
        </div>
        <div class="p-4 bg-green-50 border-l-4 border-green-500 rounded">
            <h3 class="font-bold">Estoque</h3>
            <p>0 itens</p>
        </div>
        <div class="p-4 bg-orange-50 border-l-4 border-orange-500 rounded">
            <h3 class="font-bold">Produção</h3>
            <p>Ativa</p>
        </div>
    </div>
</div>
{% endblock %}
